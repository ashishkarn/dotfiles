# version: 1.0.0

add_newline = false
continuation_prompt = "[‚Ėł‚ĖĻ ](dimmed white)"

format = """($nix_shell$container$fill$git_metrics\n)$cmd_duration\
$hostname\
$shlvl\
$shell\
$env_var\
$jobs\
$sudo\
$username\
$character"""

right_format = """
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$git_branch\
$git_commit\
$git_state\
$git_status\
$custom\
$status\
$os\
$battery\
$time"""


[fill]
symbol = ' '

[character]
format = "$symbol "
success_symbol = "[‚óé](bold italic bright-yellow)"
error_symbol = "[‚óč](italic purple)"
vimcmd_symbol = "[‚Ė†](italic dimmed green)"
# not supported in zsh
vimcmd_replace_one_symbol = "‚óĆ"
vimcmd_replace_symbol = "‚Ė°"
vimcmd_visual_symbol = "‚Ėľ"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
format = "[$symbol]($style)"
style = "bold italic bright-purple"
symbol = "‚čą‚Ēą"
disabled = false

[username]
style_user = "bright-yellow bold italic"
style_root = "purple bold italic"
format = "[‚≠ė $user]($style) "
disabled = false
show_always = false

[directory]
home_symbol = "‚Ćā"
truncation_length = 2
truncation_symbol = "‚Ė° "
read_only = " ‚óą"
use_os_path_sep = true
style = "italic blue"
format = '[$path]($style)[$read_only]($read_only_style)'
repo_root_style = 'bold blue'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [‚Ė≥](bold bright-blue)'

[cmd_duration]
min_time = 0
format = "[‚óĄ $duration ](italic white)"

[jobs]
format = "[$symbol$number]($style) "
style = "white"
symbol = "[‚Ė∂](blue italic)"

[localip]
ssh_only = true
format = " ‚óĮ[$localipv4](bold magenta)"
disabled = false

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed white"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "‚Ėą"
charging_symbol = "[‚ÜĎ](italic bold green)"
discharging_symbol = "‚Üď"
unknown_symbol = "‚ĖĎ"
empty_symbol = "‚ĖÉ"

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic dimmed bright-purple"

[[battery.display]]
threshold = 70
style = "italic dimmed yellow"

[git_branch]
format = " [$branch(:$remote_branch)]($style)"
symbol = "[‚Ė≥](bold italic bright-blue)"
style = "italic bright-blue"
truncation_symbol = "‚čĮ"
truncation_length = 11
ignore_branches = ["main", "master"]
only_attached = true

[git_metrics]
format = '([‚Ėī$added]($added_style))([‚ĖŅ$deleted]($deleted_style))'
added_style = 'italic dimmed green'
deleted_style = 'italic dimmed red'
ignore_submodules = true
disabled = false

[git_status]
style = "bold italic bright-blue"
format = "([‚é™$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed‚é•]($style))"
conflicted = "[‚ó™‚ó¶](italic bright-magenta)"
ahead = "[‚Ėī‚Ēā[${count}](bold white)‚Ēā](italic green)"
behind = "[‚ĖŅ‚Ēā[${count}](bold white)‚Ēā](italic red)"
diverged = "[‚óá ‚Ėī‚Ē§[${ahead_count}](regular white)‚Ēā‚ĖŅ‚Ē§[${behind_count}](regular white)‚Ēā](italic bright-magenta)"
untracked = "[‚óĆ‚ó¶](italic bright-yellow)"
stashed = "[‚óÉ‚óą](italic white)"
modified = "[‚óŹ‚ó¶](italic yellow)"
staged = "[‚Ė™‚Ē§[$count](bold white)‚Ēā](italic bright-cyan)"
renamed = "[‚óé‚ó¶](italic bright-blue)"
deleted = "[‚úē](italic red)"

[lua]
format = " [lua](italic) [${symbol}${version}]($style)"
symbol = "‚®Ä "
style = "bold bright-yellow"

[nodejs]
format = " [node](italic) [‚óę ($version)](bold bright-green)"
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[rust]
format = " [rs](italic) [$symbol$version]($style)"
symbol = "‚äÉ "
style = "bold red"

[c]
symbol = "‚Ąā "
format = " [$symbol($version(-$name))]($style)"

[golang]
symbol = "‚ą© "
format = " go [$symbol($version )]($style)"
